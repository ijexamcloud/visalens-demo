   * This automatically maps every Lucide icon to a global variable

   */
  /**
   * ICON SETUP
   * lucide@0.383.0 UMD exports icons as plain objects { render, ... }, NOT as
   * callable React components. We must wrap each one so React can render it.
   * createIcon() checks if the export is already a function (future-proof) or
   * wraps the object via lucide.createElement (the correct v0.3x API).
   */
  const _noIcon = (props) => React.createElement('span', null);

  function createIcon(name) {
    if (!window.lucide) return _noIcon;
    const raw = window.lucide[name];
    if (!raw) return _noIcon;
    // Already a callable component (some builds / future versions)
    if (typeof raw === 'function') return raw;
    // UMD object shape — wrap with lucide.createElement
    if (typeof window.lucide.createElement === 'function') {
      return (props) => window.lucide.createElement(name, props);
    }
    // Last-resort: hand-roll an SVG wrapper via the icon's toSvg / render method
    if (typeof raw.render === 'function') {
      return (props) => {
        const { size = 24, color = 'currentColor', strokeWidth = 2, ...rest } = props || {};
        const svgStr = raw.render({ size, color, strokeWidth });
        return React.createElement('span', {
          ...rest,
          style: { display:'inline-flex', ...rest.style },
          dangerouslySetInnerHTML: { __html: svgStr }
        });
      };
    }
    return _noIcon;
  }

/* ─── OFFER LETTER RESOLVER (3-tier hierarchy) ───────────────────────────── */
// Tier 1: offerLetters[preferredIdx].country
// Tier 2: offerLetters[0].country (if no preference but data exists)
// Tier 3: standalone targetCountry (pre-application, no offer yet)
function resolveOffer(profile, preferredIdx = 0) {
  const offers = profile?.offerLetters;
  if (Array.isArray(offers) && offers.length > 0) {
    const idx = (preferredIdx >= 0 && preferredIdx < offers.length) ? preferredIdx : 0;
    const o = offers[idx];
    return {
      country:      o.country      && o.country      !== "Not found" ? o.country      : null,
      university:   o.university   && o.university   !== "Not found" ? o.university   : null,
      status:       o.status       || null,
      program:      o.program      && o.program      !== "Not found" ? o.program      : null,
      intakeSeason: o.intakeSeason && o.intakeSeason !== "Not found" ? o.intakeSeason : null,
      conditions:   o.conditions   || null,
      hasOffer: true,
      idx,
    };
  }
  const fallback = profile?.targetCountry && profile.targetCountry !== "Not found" ? profile.targetCountry : null;
  return { country: fallback, university: null, status: null, program: null, intakeSeason: null, conditions: null, hasOffer: false, idx: 0 };
}

/* ─── LEGACY OFFER LETTER MIGRATION ─────────────────────────────────────── */
// Converts old flat offerLetter string → new offerLetters array.
// Called when loading cases saved before v8, or when the AI returns the old format.
function migrateOfferLetter(profile) {
  if (!profile) return profile;
  if (Array.isArray(profile.offerLetters)) return profile; // already new format
  const old = profile.offerLetter;
  if (!old || old === "Not found" || old === "") {
    const { offerLetter: _drop, ...rest } = profile;
    return { ...rest, offerLetters: [] };
  }
  // Parse "Full — University, Country" or "Conditional — University, Country"
  const m = old.match(/^(Full|Conditional)\s*[—\-–]\s*(.+?)(?:,\s*(.+))?$/i);
  const { offerLetter: _drop, ...rest } = profile;
  if (m) {
    return { ...rest, offerLetters: [{ status: m[1], university: (m[2]||"").trim(), country: (m[3]||profile.targetCountry||"Not found").trim(), program: "Not found", intakeSeason: "Not found", conditions: "" }] };
  }
  return { ...rest, offerLetters: [{ status: "Legacy", university: old, country: profile.targetCountry||"Not found", program: "Not found", intakeSeason: "Not found", conditions: "" }] };
}

/* ─── CURRENCY PARSER ────────────────────────────────────────────────────── */
// Returns { amount: number|null, currency: string|null }
// Handles: £12,000  GBP 12,000  PKR 5,495,000  5.000.000 EUR  $18,000  Rs 500,000
function parseCurrencyAmount(str) {
  if (!str || str === "Not found" || str.trim() === "") return { amount: null, currency: null };
  const s = str.trim();

  // Detect currency — symbol wins over ISO code if both present
  const SYMBOL_MAP = [
    { re: /£/,                 iso: "GBP" },
    { re: /€/,                 iso: "EUR" },
    { re: /A\$|AUD/i,          iso: "AUD" },
    { re: /C\$|CAD/i,          iso: "CAD" },
    { re: /NZ\$|NZD/i,         iso: "NZD" },
    { re: /\$\s*(?!CAD|AUD)/i, iso: "USD" },
    { re: /¥|CNY|JPY/i,        iso: "CNY" },
    { re: /PKR|Rs\.?\s|₨/i,    iso: "PKR" },
    { re: /INR|₹/i,            iso: "INR" },
    { re: /EUR/i,              iso: "EUR" },
    { re: /GBP/i,              iso: "GBP" },
    { re: /USD/i,              iso: "USD" },
  ];
  let currency = null;
  for (const { re, iso } of SYMBOL_MAP) {
    if (re.test(s)) { currency = iso; break; }
  }

  // Strip everything except digits, commas, dots
  const numStr = s.replace(/[^0-9.,]/g, "").trim();
  if (!numStr) return { amount: null, currency };

  // Distinguish European notation (1.234.567,00) from UK/US (1,234,567.00)
  // Rule: if the string has both , and . — the last one is the decimal separator
  let normalised = numStr;
  const lastDot   = numStr.lastIndexOf(".");
  const lastComma = numStr.lastIndexOf(",");
  if (lastDot > -1 && lastComma > -1) {
    if (lastComma > lastDot) {
      // European: 1.234.567,00 → remove dots, replace comma with dot
      normalised = numStr.replace(/\./g, "").replace(",", ".");
    } else {
      // UK/US: 1,234,567.00 → remove commas
      normalised = numStr.replace(/,/g, "");
    }
  } else if (lastComma > -1 && lastDot === -1) {
    // Comma only — treat as thousands separator if >3 digits after it, else decimal
    const afterComma = numStr.slice(lastComma + 1);
    normalised = afterComma.length === 3 ? numStr.replace(/,/g, "") : numStr.replace(",", ".");
  } else if (lastDot > -1 && lastComma === -1) {
    // Dot only — treat as thousands separator if >3 digits after it, else decimal
    const afterDot = numStr.slice(lastDot + 1);
    normalised = afterDot.length === 3 && numStr.replace(/[^.]/g,"").length > 1
      ? numStr.replace(/\./g, "") : numStr;
  }

  const amount = parseFloat(normalised);
  return { amount: isNaN(amount) ? null : amount, currency };
}

/* ─── AUTO-POPULATE FUNDS REQUIRED FROM UNIVERSITY DATA ─────────────────── */
// Returns { value, amount, currency, label, source:"builtin"|"csv" } or null
function lookupFundsRequired(profile, preferredIdx, requirementsData) {
  if (!requirementsData) return null;
  const resolved = resolveOffer(profile, preferredIdx);
  const offerCountry = resolved.country;
  const offerUni     = resolved.university;
  const offerProg    = resolved.program;
  if (!offerCountry && !offerUni) return null;

  // Fuzzy country match
  const countryKey = Object.keys(requirementsData).find(k =>
    k === offerCountry ||
    (offerCountry && (
      k.toLowerCase().includes(offerCountry.toLowerCase()) ||
      offerCountry.toLowerCase().includes(k.toLowerCase())
    ))
  );
  if (!countryKey) return null;
  const countryData = requirementsData[countryKey];
  if (!countryData?.universities) return null;

  const currency = COUNTRY_CURRENCY[countryKey] || null;
  const source   = Object.keys(UNIVERSITY_DATA).includes(countryKey) ? "builtin" : "csv";

  // Fuzzy university match
  const uniKey = Object.keys(countryData.universities).find(k =>
    k === offerUni ||
    (offerUni && (
      k.toLowerCase().includes(offerUni.toLowerCase()) ||
      offerUni.toLowerCase().includes(k.toLowerCase())
    ))
  );
  if (!uniKey) return null;
  const uniData = countryData.universities[uniKey];
  if (!uniData?.programs?.length) return null;

  // Fuzzy programme match — fall back to first programme
  const prog = (offerProg && offerProg !== "Not found")
    ? (uniData.programs.find(p =>
        p.name === offerProg ||
        p.name.toLowerCase().includes(offerProg.toLowerCase()) ||
        offerProg.toLowerCase().includes(p.name.toLowerCase())
      ) || uniData.programs[0])
    : uniData.programs[0];

  if (!prog?.financial) return null;

  const value = currency
    ? `${currency} ${prog.financial.toLocaleString()}`
    : `${prog.financial.toLocaleString()}`;
  const label = `${uniKey} · ${prog.name}`;

  return { value, amount: prog.financial, currency, label, source };
}

/* ─── CSV PARSER ─────────────────────────────────────────────────────────── */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h,i) => [h, (vals[i]||"").replace(/^"|"$/g,"").trim()]));
  });
}
function normaliseRow(row) {
  // Detect format by checking which keys exist, then map to a canonical shape
  const keys = Object.keys(row);
  const has = k => keys.some(x => x.toLowerCase().replace(/\s/g,"") === k.toLowerCase().replace(/\s/g,""));
  // Helper: get value by any of several possible key spellings
  const get = (...names) => {
    for (const n of names) {
      const found = keys.find(k => k.trim().toLowerCase() === n.trim().toLowerCase());
      if (found && row[found]?.trim()) return row[found].trim();
    }
    return "";
  };
  // Extract IELTS score from a mixed string like "6.5 IELTS / 58 PTE" or "3.0 GPA / 6.5 IELTS"
  function extractIELTS(str) {
    const m = str.match(/(\d+\.?\d*)\s*IELTS/i);
    return m ? parseFloat(m[1]) : NaN;
  }
  // Extract GPA score from a mixed string like "3.5 GPA / 120 DET"
  function extractGPA(str) {
    const m = str.match(/(\d+\.?\d*)\s*GPA/i);
    return m ? parseFloat(m[1]) : NaN;
  }
  // Extract numeric amount from strings like "£16500", "$45000 CAD", "€0 Tuition", "$1023/month"
  function extractNum(str) {
    const m = str.replace(/[,]/g,"").match(/(\d+\.?\d*)/);
    return m ? parseFloat(m[1]) : NaN;
  }

  const admReq = get("Admission Requirements", "Requirements");
  const country  = get("Country");
  const uni      = get("University Name", "University");
  const prog     = get("Courses", "Course", "Program", "Programme");
  const levelRaw = get("Level");
  const rankRaw  = get("Ranking");
  const intakeRaw= get("Intake");

  // IELTS: dedicated column wins, else parse from Admission Requirements
  let ielts = parseFloat(get("Min_IELTS", "IELTS"));
  if (isNaN(ielts) && admReq) ielts = extractIELTS(admReq);

  // GPA: dedicated column wins, else parse from Admission Requirements
  let gpa = parseFloat(get("Min_GPA", "GPA"));
  if (isNaN(gpa) && admReq) gpa = extractGPA(admReq);

  // Financial: dedicated column or Living Cost
  let fin = extractNum(get("Min_Financial", "Living Cost", "LivingCost"));

  // Tuition
  const tuitionRaw = get("Tuition", "Tution Fees", "Tuition Fees", "TuitionFees");
  let tuition = extractNum(tuitionRaw);

  // Notes: combine Notes + Intake if present
  const noteParts = [get("Notes"), intakeRaw ? `Intakes: ${intakeRaw}` : ""].filter(Boolean);

  return { country, uni, prog, levelRaw, rankRaw, admReq,
    ielts: isNaN(ielts) ? 6.0 : ielts,
    gpa:   isNaN(gpa)   ? 3.0 : gpa,
    financial: isNaN(fin)     ? 10000 : fin,
    tuition:   isNaN(tuition) ? 15000 : tuition,
    duration:  get("Duration") || "1 year",
    note:      noteParts.join(" | "),
  };
}
function csvToRequirements(rows) {
  const result = {};
  for (const row of rows) {
    const { country, uni, prog, levelRaw, rankRaw, ielts, gpa, financial, tuition, duration, note } = normaliseRow(row);
    if (!country || !uni || !prog) continue;
    const meta = getCountryMeta(country);
    if (!result[country]) result[country] = {
      flag: meta.flag,
      visaType: meta.visaType,
      visaChecklist: UNIVERSITY_DATA[country]?.visaChecklist || [],
      universities: {}
    };
    if (!result[country].universities[uni])
      result[country].universities[uni] = { ranking: rankRaw || "—", programs: [] };
    result[country].universities[uni].programs.push({
      name: prog,
      level: levelRaw || "Postgraduate",
      ielts, gpa, financial, duration, tuition, note,
    });
  }
  return result;
}
function downloadCSV(text, filename) {
  const b64     = btoa(unescape(encodeURIComponent(text)));
  const dataUrl = `data:text/csv;base64,${b64}`;
  const a       = document.createElement("a");
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function parseGPA(str) {
  if (!str || str === "Not found") return null;
  const m = str.match(/(\d+\.?\d*)/); return m ? parseFloat(m[1]) : null;
}
function parseIELTS(str) {
  if (!str || str === "Not found") return null;
  const m = str.match(/(\d+\.?\d*)/); return m ? parseFloat(m[1]) : null;
}
function parseFinancial(str) {
  if (!str || str === "Not found") return null;
  const m = str.replace(/,/g,"").match(/(\d+\.?\d*)/); return m ? parseFloat(m[1]) : null;
}
function daysUntilExpiry(dateStr) {
  if (!dateStr || dateStr === "Not found") return null;
  const formats = [/(\d{2})\.(\d{2})\.(\d{4})/,/(\d{4})-(\d{2})-(\d{2})/,/(\d{2})\/(\d{2})\/(\d{4})/,/(\d{2})-(\d{2})-(\d{4})/];
  let date = null;
  for (const fmt of formats) {
    const m = dateStr.match(fmt);
    if (m) { date = fmt === formats[1] ? new Date(`${m[1]}-${m[2]}-${m[3]}`) : new Date(`${m[3]}-${m[2]}-${m[1]}`); break; }
  }
  if (!date || isNaN(date)) return null;
  return Math.floor((date - new Date()) / 86400000);
}
function scoreCol(s) { return s >= 70 ? "#059669" : s >= 45 ? "#B45309" : "#DC2626"; }
function scoreBadge(s) { return s >= 70 ? "b-ok" : s >= 45 ? "b-warn" : "b-err"; }
function scoreLabel(s) { return s >= 70 ? "Strong" : s >= 45 ? "Moderate" : "Weak"; }

function guessType(name) {
  const n = name.toLowerCase();
  if (n.includes("passport")||n.includes(" id "))               return "passport";
  if (n.includes("birth"))                                       return "birth_certificate";
  if (n.includes("domicile"))                                    return "domicile";
  if (n.includes("marriage")||n.includes("nikah"))              return "marriage_certificate";
  if (n.includes("police")||n.includes("pcc")||n.includes("clearance")) return "police_clearance";
  if (n.includes("transcript")||n.includes("grade")||n.includes("result")) return "transcript";
  if (n.includes("degree")||n.includes("certificate")&&!n.includes("birth")&&!n.includes("domicile")) return "degree_certificate";
  if (n.includes("experience")||n.includes("employment")||n.includes("noc")&&!n.includes("_noc")) return "experience_letter";
  if (n.includes("gap")||n.includes("explanation"))             return "gap_letter";
  if (n.includes("offer")||n.includes("admission"))             return "offer_letter";
  if (n.includes("scholarship")||n.includes("funding"))         return "scholarship_letter";
  if (n.includes("noc"))                                        return "noc";
  if (n.includes("bank")||n.includes("statement"))             return "bank_statement";
  if (n.includes("financial")||n.includes("sponsor")||n.includes("affidavit")) return "financial_proof";
  if (n.includes("fee")||n.includes("receipt")||n.includes("payment")&&!n.includes("ihs")) return "fee_receipt";
  if (n.includes("ielts")||n.includes("toefl")||n.includes("pte")||n.includes("language")) return "language_test";
  if (n.includes("ihs"))                                        return "ihs_receipt";
  if (n.includes("tb")||n.includes("tuberculosis"))             return "tb_test";
  if (n.includes("medical")||n.includes("health"))             return "medical_certificate";
  if (n.includes("recommend")||n.includes("reference"))        return "recommendation";
  return "other";
}

.sb-panels{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--bd);margin-top:2px}
.sb-panel{border-bottom:1px solid var(--bd)}
.sb-panel:last-child{border-bottom:none}
.sb-panel-hdr{width:100%;display:flex;align-items:center;gap:8px;padding:10px 14px;background:transparent;border:none;cursor:pointer;text-align:left;transition:background var(--fast)}
.sb-panel-hdr:hover{background:var(--s2)}
.sb-panel-ttl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);flex:1}
.sb-panel-body{padding:10px 14px 14px;border-top:1px solid var(--bd);background:var(--s2)}
.sb-checklist-info{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--info);font-family:var(--fm);line-height:1.5;padding:8px 10px;background:var(--infog);border:1px solid rgba(2,132,199,.2);border-radius:var(--r1);margin-bottom:10px}
.sb-check-list{display:flex;flex-direction:column;gap:4px}
.sb-check-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r1);cursor:pointer;transition:background var(--fast);border:1px solid transparent}
.sb-check-item:hover{background:var(--s1)}
.sb-check-item.ticked{background:var(--okg);border-color:rgba(5,150,105,.2)}
.sb-checkbox{width:14px;height:14px;flex-shrink:0;accent-color:var(--ok);cursor:pointer}
.sb-check-name{font-size:12px;color:var(--t1);flex:1;line-height:1.3}
.sb-check-item.ticked .sb-check-name{color:var(--ok);text-decoration:line-through;text-decoration-color:rgba(5,150,105,.4)}
.sb-reset-btn{margin-top:8px;font-size:11px;color:var(--t3);background:transparent;border:1px solid var(--bd);border-radius:var(--r1);padding:3px 10px;cursor:pointer;font-family:var(--fm);transition:all var(--fast)}
.sb-reset-btn:hover{color:var(--err);border-color:rgba(220,38,38,.3);background:var(--errg)}

/* BUTTONS */
.btn-p{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:44px;border:none;border-radius:var(--r2);cursor:pointer;background:var(--p);color:#fff;font-family:var(--fu);font-size:14px;font-weight:600;transition:all var(--fast) var(--eout)}
.btn-p:hover:not(:disabled){opacity:.92;transform:translateY(-1px);box-shadow:0 4px 16px rgba(29,107,232,.28)}
.btn-p:active:not(:disabled){transform:scale(.98)}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-wrap{padding:6px 14px 14px}
.btn-clear-all{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#DC2626;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--r2);padding:0 14px;height:38px;cursor:pointer;white-space:nowrap;transition:background var(--base);font-family:var(--fm)}
.btn-clear-all:hover{background:#FEE2E2}
.btn-s{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--r1);cursor:pointer;background:var(--s2);border:1px solid var(--bdem);color:var(--t2);font-size:12px;font-weight:500;transition:all var(--fast) var(--eout)}
.btn-s:hover{background:var(--s3);color:var(--t1)}
.btn-o{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--r1);cursor:pointer;background:transparent;border:1px solid var(--pm);color:var(--p);font-size:12px;font-weight:500;transition:all var(--fast) var(--eout)}
.btn-o:hover{background:var(--pg)}
.btn-danger{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--r1);cursor:pointer;background:transparent;border:1px solid rgba(220,38,38,.3);color:var(--err);font-size:12px;font-weight:500;transition:all var(--fast) var(--eout)}
.btn-danger:hover{background:var(--errg)}
.btn-green{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--r1);cursor:pointer;background:transparent;border:1px solid rgba(5,150,105,.3);color:var(--ok);font-size:12px;font-weight:500;transition:all var(--fast) var(--eout)}
.btn-green:hover{background:var(--okg)}
.btn-ico{width:26px;height:26px;border-radius:var(--r1);background:transparent;border:1px solid var(--bd);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--fast) var(--eout)}
.btn-ico:hover{background:var(--pg);border-color:var(--p);color:var(--p)}
.btn-ico.d:hover{background:var(--errg);border-color:var(--err);color:var(--err)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;letter-spacing:.04em;white-space:nowrap}
.b-ok{background:var(--okg);color:var(--ok);border:1px solid rgba(5,150,105,.25)}
.b-warn{background:var(--warng);color:var(--warn);border:1px solid rgba(180,83,9,.25)}
.b-err{background:var(--errg);color:var(--err);border:1px solid rgba(220,38,38,.25)}
.b-info{background:var(--infog);color:var(--info);border:1px solid rgba(2,132,199,.25)}
.b-neu{background:var(--s3);color:var(--t2);border:1px solid var(--bd)}
.b-p{background:var(--pg);color:var(--p);border:1px solid rgba(29,107,232,.25)}

/* RESULT CARDS */
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);animation:fadeUp var(--slow) var(--eout) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rc:nth-child(2){animation-delay:50ms}.rc:nth-child(3){animation-delay:100ms}
.rc:nth-child(4){animation-delay:150ms}.rc:nth-child(5){animation-delay:200ms}
.rc:nth-child(6){animation-delay:250ms}.rc:nth-child(7){animation-delay:300ms}
.rc-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bd);min-height:44px}
.rc-ico{width:28px;height:28px;border-radius:var(--r1);background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rc-ttl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);flex:1}
.rc-body{padding:16px}

/* PROFILE GRID */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pgroup{margin-bottom:12px}
.pgroup:last-child{margin-bottom:0}
.pgroup-label{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.pfield{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);padding:8px 10px;transition:border-color var(--fast)}
.pfield.s2{grid-column:1/-1}
.pfield:focus-within{border-color:var(--p)}
.plbl{font-family:var(--fm);font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.pval-input{width:100%;background:transparent;border:none;outline:none;font-size:13px;font-weight:500;color:var(--t1);font-family:var(--fu);line-height:1.4}
.pval-input::placeholder{color:var(--t3);font-style:italic;font-weight:400}
.pval-textarea{width:100%;background:transparent;border:none;outline:none;font-size:13px;font-weight:500;color:var(--t1);font-family:var(--fu);line-height:1.55;resize:none;min-height:56px}
.pval-textarea::placeholder{color:var(--t3);font-style:italic;font-weight:400}
.edit-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:7px 10px;background:var(--pg);border:1px solid rgba(29,107,232,.2);border-radius:var(--r1)}
.edit-hint{font-size:12px;color:var(--p);font-weight:500;flex:1}

/* EXPIRY ALERT */
.expiry-alert{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r1);border:1px solid;margin-bottom:10px}
.expiry-alert.danger{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.expiry-alert.warn{background:rgba(180,83,9,.06);border-color:rgba(180,83,9,.2)}
.expiry-alert-icon.danger{color:var(--err);flex-shrink:0;margin-top:1px}
.expiry-alert-icon.warn{color:var(--warn);flex-shrink:0;margin-top:1px}
.expiry-title{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.expiry-detail{font-size:11px;color:var(--t2);font-family:var(--fm)}

/* STUDY GAP ALERT */
.study-gap-alert{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r1);border:1px solid rgba(180,83,9,.25);background:rgba(180,83,9,.06);margin-bottom:10px;color:var(--warn)}
.study-gap-title{font-size:12px;font-weight:700;color:var(--warn);margin-bottom:2px}
.study-gap-detail{font-size:11px;color:var(--t2);font-family:var(--fm);line-height:1.5}

/* MISSING / FLAGS */
.miss-list{display:flex;flex-direction:column;gap:8px}
.miss-item{display:flex;gap:10px;padding:10px;background:var(--warng);border:1px solid rgba(180,83,9,.2);border-radius:var(--r1)}
.miss-ico{color:var(--warn);flex-shrink:0;margin-top:1px}
.miss-n{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px}
.miss-w{font-size:12px;color:var(--t2);font-family:var(--fm);line-height:1.45}
.all-clear{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--okg);border:1px solid rgba(5,150,105,.2);border-radius:var(--r1);font-size:13px;color:var(--ok);font-weight:500}
.elig-sum{font-size:13px;line-height:1.65;color:var(--t2);margin-bottom:14px}
.sbar{margin-bottom:10px}
.sbar-lbl{display:flex;justify-content:space-between;margin-bottom:4px}
.sbar-nm{font-size:12px;color:var(--t2)}.sbar-num{font-family:var(--fm);font-size:12px;font-weight:500}
.sbar-tr{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.sbar-fl{height:100%;border-radius:3px;transition:width 900ms var(--eout)}
.elig-notes{display:flex;flex-direction:column;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
.en{display:flex;gap:8px;font-size:12px;color:var(--t2);font-family:var(--fm);line-height:1.5}
.en-dot{width:4px;height:4px;border-radius:50%;background:var(--info);flex-shrink:0;margin-top:5px}
.flag-list{display:flex;flex-direction:column;gap:8px}
.fi{display:flex;gap:10px;padding:10px;border-radius:var(--r1);border:1px solid}
.fi.high{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.fi.medium{background:rgba(180,83,9,.06);border-color:rgba(180,83,9,.2)}
.fi.low{background:rgba(2,132,199,.06);border-color:rgba(2,132,199,.2)}
.fsev{font-family:var(--fm);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:1px;line-height:1.6}
.fsev.high{background:rgba(220,38,38,.15);color:var(--err)}
.fsev.medium{background:rgba(180,83,9,.15);color:var(--warn)}
.fsev.low{background:rgba(2,132,199,.15);color:var(--info)}
.fttl{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}
.fdet{font-size:12px;color:var(--t2);font-family:var(--fm);line-height:1.5}

/* NOTES */
.notes-area{width:100%;min-height:76px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);color:var(--t1);font-family:var(--fm);font-size:13px;line-height:1.6;padding:10px;resize:vertical;outline:none}
.notes-area:focus{border-color:var(--p)}
.notes-area::placeholder{color:var(--t3)}
.notes-acts{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.notes-sp{flex:1}
.saved-msg{display:flex;align-items:center;gap:4px;font-size:12px;font-family:var(--fm);color:var(--ok)}

/* QUALITY */
.qa-card{background:#FFFBEB;border:1px solid rgba(180,83,9,.3);border-radius:var(--r3);overflow:hidden;animation:fadeUp var(--slow) var(--eout) both;box-shadow:var(--sh1)}
body.dm .qa-card{background:rgba(40,25,0,.4);border-color:rgba(180,83,9,.4)}
.qa-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(180,83,9,.2);background:rgba(180,83,9,.05);min-height:44px}
.qa-ttl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--warn);flex:1}
.qa-body{padding:16px;display:flex;flex-direction:column;gap:8px}
.qa-item{display:flex;gap:10px;padding:10px;border-radius:var(--r1);border:1px solid}
.qa-item.warn{background:rgba(180,83,9,.05);border-color:rgba(180,83,9,.2)}
.qa-item.err{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.2)}
.qa-ico{flex-shrink:0;margin-top:1px}
.qa-ico.warn{color:var(--warn)}.qa-ico.err{color:var(--err)}
.qa-n{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}
.qa-d{font-size:12px;color:var(--t2);font-family:var(--fm);line-height:1.5}
.qa-tip{display:flex;align-items:flex-start;gap:8px;padding:10px;background:var(--infog);border:1px solid rgba(2,132,199,.2);border-radius:var(--r1);font-size:12px;color:var(--info);font-family:var(--fm);line-height:1.5;margin-top:4px}

/* SKELETON */
.skel{background:var(--s3);border-radius:var(--r1);animation:shim 1.6s ease-in-out infinite}
@keyframes shim{0%,100%{opacity:.6}50%{opacity:1}}
.skel-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1)}
.skel-hdr{height:44px;border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px}
.skel-body{padding:16px;display:flex;flex-direction:column;gap:8px}
.skel-line{height:13px}.skel-line.s{width:40%}.skel-line.m{width:65%}

/* EMPTY / ERROR */
.empty{padding:48px 32px;text-align:center;background:var(--s1);border:1px dashed var(--bd);border-radius:var(--r3);box-shadow:var(--sh1)}
.empty-ico{color:var(--t3);margin:0 auto 14px}
.empty-ttl{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;color:var(--t2);margin-bottom:7px}
.empty-sub{font-size:12px;color:var(--t3);font-family:var(--fm);line-height:1.6}
.err-banner{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;margin:0 14px 10px;background:var(--errg);border:1px solid rgba(220,38,38,.25);border-radius:var(--r2);font-size:12px;color:var(--err);font-family:var(--fm);line-height:1.5}

/* CONFLICT BANNER */
.conflict-banner{background:#FFF7F7;border:2px solid #FCA5A5;border-radius:var(--r3);padding:18px;margin-bottom:18px;font-family:var(--fm)}
.conflict-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.conflict-title{font-size:14px;font-weight:700;color:#DC2626;margin-bottom:3px}
.conflict-sub{font-size:12px;color:#7F1D1D;line-height:1.5}
.conflict-students{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.conflict-student{background:#fff;border:1px solid #FCA5A5;border-radius:var(--r2);padding:12px 14px}
.conflict-s-header{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.conflict-s-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#FEE2E2;color:#DC2626;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.conflict-s-name{font-size:13px;font-weight:700;color:var(--t1)}
.conflict-s-ids{font-size:11px;color:var(--t3);flex:1}
.conflict-files{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.conflict-file-pill{background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;font-size:11px;color:#991B1B;padding:3px 8px;font-family:var(--fm);word-break:break-all}
.conflict-remove-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#DC2626;background:#FEE2E2;border:1px solid #FCA5A5;border-radius:var(--r1);padding:5px 12px;cursor:pointer;transition:background var(--base)}
.conflict-remove-btn:hover{background:#FECACa}
.conflict-hint{font-size:11px;color:#9B1C1C;line-height:1.5;flex:1}
.conflict-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#FEF2F2;border-radius:var(--r1);padding:10px 12px;margin-top:4px}
.conflict-proceed-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#fff;background:#16A34A;border:none;border-radius:var(--r2);padding:8px 18px;cursor:pointer;white-space:nowrap;transition:background var(--base);flex-shrink:0}
.conflict-proceed-btn:hover{background:#15803D}
.conflict-likely{border-color:#16A34A!important;background:#F0FDF4!important}
.likely-badge{background:#DCFCE7!important;color:#15803D!important}
.conflict-s-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.conflict-this-is-my-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#15803D;background:#DCFCE7;border:1px solid #86EFAC;border-radius:var(--r1);padding:5px 12px;cursor:pointer;transition:background var(--base)}
.conflict-this-is-my-btn:hover{background:#BBF7D0}
.conflict-unrelated{margin-top:12px;padding-top:12px;border-top:1px solid rgba(220,38,38,.15)}
.conflict-unrelated-ttl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* ADVISORY BANNER (sponsor/parent financial docs) */
.advisory-banner{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:var(--r3);padding:14px 16px;margin-bottom:18px;font-family:var(--fm)}
.advisory-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.advisory-title{font-size:13px;font-weight:700;color:#92400E;margin-bottom:3px}
.advisory-note{font-size:12px;color:#78350F;line-height:1.5}
.advisory-sponsor{font-size:12px;color:#78350F;margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
.advisory-sponsor-label{font-weight:600;margin-right:6px}
.advisory-file-pill{background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;font-size:11px;color:#92400E;padding:3px 8px;font-family:var(--fm);word-break:break-all}
.advisory-dismiss{font-size:11px;font-weight:600;color:#92400E;background:transparent;border:1px solid #FCD34D;border-radius:var(--r1);padding:4px 12px;cursor:pointer;transition:background var(--base)}
.advisory-dismiss:hover{background:#FEF3C7}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,30,60,.55);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn var(--base) var(--eout)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--sh3);width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:modalIn var(--slow) var(--eout)}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.modal-title{font-size:13px;font-weight:700;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-body{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;background:var(--s2)}
.modal-img{max-width:100%;max-height:65vh;object-fit:contain;border-radius:var(--r1);box-shadow:var(--sh2)}
.modal-pdf{width:100%;height:65vh;border:none;border-radius:var(--r1)}
.modal-txt{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;font-family:var(--fm);font-size:12px;color:var(--t1);line-height:1.7;white-space:pre-wrap;max-height:65vh;overflow:auto;width:100%}

/* UNIVERSITY CHECKER — sidebar compact mode */
.uni-sidebar-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);margin:0 0 0 0}
.uni-sidebar-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bd);min-height:44px}
.uni-sidebar-ttl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);flex:1}
.uni-sidebar-body{padding:14px 16px}
.uni-selects-stack{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}

/* UNIVERSITY CHECKER */
.uni-selects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.uni-select-wrap{display:flex;flex-direction:column;gap:5px}
.uni-select-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--fm)}
.uni-select{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--t1);font-family:var(--fu);font-size:12px;font-weight:500;padding:8px 10px;border-radius:var(--r2);outline:none;cursor:pointer;transition:border-color var(--fast)}
.uni-select:focus{border-color:var(--p)}
.uni-result{display:flex;flex-direction:column;gap:8px}
.uni-req-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.uni-req-item{padding:10px;border-radius:var(--r1);border:1px solid;text-align:center}
.uni-req-item.pass{background:var(--okg);border-color:rgba(5,150,105,.25)}
.uni-req-item.fail{background:var(--errg);border-color:rgba(220,38,38,.25)}
.uni-req-item.unknown{background:var(--s2);border-color:var(--bd)}
.uni-req-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-family:var(--fm)}
.uni-req-label.pass{color:var(--ok)}
.uni-req-label.fail{color:var(--err)}
.uni-req-label.unknown{color:var(--t3)}
.uni-req-val{font-size:12px;font-weight:600;color:var(--t2);margin-top:2px}
.uni-req-student{font-size:11px;color:var(--t1);font-weight:700;margin-top:1px}
.uni-req-need{font-size:10px;font-family:var(--fm);color:var(--t3);margin-top:3px}
.uni-verdict{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r2);border:1px solid;margin-bottom:10px}
.uni-verdict.eligible{background:var(--okg);border-color:rgba(5,150,105,.2)}
.uni-verdict.ineligible{background:var(--errg);border-color:rgba(220,38,38,.2)}
.uni-verdict.partial{background:var(--warng);border-color:rgba(180,83,9,.2)}
.uni-verdict.unknown{background:var(--s2);border-color:var(--bd)}
.uni-verdict-txt{font-size:13px;font-weight:600;flex:1}
.uni-verdict-txt.eligible{color:var(--ok)}
.uni-verdict-txt.ineligible{color:var(--err)}
.uni-verdict-txt.partial{color:var(--warn)}
.uni-verdict-txt.unknown{color:var(--t2)}
.uni-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uni-info-item{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);padding:8px 10px}
.uni-info-lbl{font-size:10px;font-family:var(--fm);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.uni-info-val{font-size:13px;font-weight:600;color:var(--t1)}
.uni-note{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--infog);border:1px solid rgba(2,132,199,.2);border-radius:var(--r1);font-size:12px;color:var(--info);font-family:var(--fm);line-height:1.5}
.uni-src-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--fm);padding:2px 7px;border-radius:10px;margin-bottom:12px}
.uni-src-badge.custom{background:var(--okg);color:var(--ok);border:1px solid rgba(5,150,105,.25)}
.uni-src-badge.builtin{background:var(--infog);color:var(--info);border:1px solid rgba(2,132,199,.25)}

/* VISA CHECKLIST */
.vc-list{display:flex;flex-direction:column;gap:6px}
.vc-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1)}
.vc-icon.ok{color:var(--ok);flex-shrink:0;margin-top:1px}
.vc-icon.pending{color:var(--t3);flex-shrink:0;margin-top:1px}
.vc-doc{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.vc-note{font-size:11px;color:var(--t2);font-family:var(--fm)}

/* DOC PRESENCE CHECKER */
.dpc-summary{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);margin-bottom:12px;font-size:13px;font-weight:600;border:1px solid}
.dpc-summary.all-ok{background:var(--okg);border-color:rgba(5,150,105,.2);color:var(--ok)}
.dpc-summary.has-missing{background:var(--errg);border-color:rgba(220,38,38,.2);color:var(--err)}
.dpc-summary.partial{background:var(--warng);border-color:rgba(180,83,9,.2);color:var(--warn)}
.dpc-list{display:flex;flex-direction:column;gap:6px}
.dpc-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r1);border:1px solid;transition:border-color var(--fast)}
.dpc-item.present{background:var(--okg);border-color:rgba(5,150,105,.25)}
.dpc-item.missing{background:var(--errg);border-color:rgba(220,38,38,.25)}
.dpc-item.optional{background:var(--s2);border-color:var(--bd)}
.dpc-icon{flex-shrink:0}
.dpc-icon.present{color:var(--ok)}
.dpc-icon.missing{color:var(--err)}
.dpc-icon.optional{color:var(--t3)}
.dpc-name{font-size:12px;font-weight:600;color:var(--t1);flex:1}
.dpc-status{font-size:11px;font-family:var(--fm);font-weight:500;white-space:nowrap}
.dpc-status.present{color:var(--ok)}
.dpc-status.missing{color:var(--err)}
.dpc-status.optional{color:var(--t3)}
.dpc-hint{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--infog);border:1px solid rgba(2,132,199,.2);border-radius:var(--r1);font-size:11px;color:var(--info);font-family:var(--fm);line-height:1.5;margin-top:8px}

/* REQUIREMENTS MANAGER */
.req-page{max-width:900px}
.req-status-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r2);margin-bottom:20px;font-size:13px;font-weight:500;border:1px solid}
.req-status-bar.builtin{background:var(--infog);border-color:rgba(2,132,199,.2);color:var(--info)}
.req-status-bar.custom{background:var(--okg);border-color:rgba(5,150,105,.2);color:var(--ok)}
.req-upload-zone{border:1.5px dashed var(--bdem);border-radius:var(--r2);padding:28px;text-align:center;cursor:pointer;transition:all var(--base) var(--eout);background:var(--s2);margin-bottom:16px}
.req-upload-zone:hover,.req-upload-zone.over{border-color:var(--p);background:var(--pg)}
.req-acts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.req-preview-wrap{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-top:8px}
.req-preview-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s2);border-bottom:1px solid var(--bd)}
.req-preview-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2)}
.req-scroll{overflow-x:auto}
.req-table{width:100%;border-collapse:collapse;font-size:12px}
.req-table th{background:var(--s3);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);font-family:var(--fm);border-bottom:1px solid var(--bd);white-space:nowrap}
.req-table td{padding:8px 12px;border-bottom:1px solid var(--bd);color:var(--t2);font-family:var(--fm);white-space:nowrap;font-size:12px}
.req-table tr:last-child td{border-bottom:none}
.req-table tr:hover td{background:var(--s2);color:var(--t1)}
.req-more{font-size:11px;color:var(--t3);font-family:var(--fm);padding:10px 16px;text-align:center;border-top:1px solid var(--bd);background:var(--s2)}
.req-country-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--pg);color:var(--p);border:1px solid rgba(29,107,232,.2);font-family:var(--fm);white-space:nowrap}
.req-format-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.req-format-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--fm);margin-bottom:10px}
.req-col-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.req-col-item{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r1);padding:7px 10px}
.req-col-name{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--p);margin-bottom:2px}
.req-col-desc{font-size:11px;color:var(--t3)}

/* REPORT MODAL */
.report-modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--sh3);width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;animation:modalIn var(--slow) var(--eout)}
.report-body{flex:1;overflow:auto;padding:16px}
.report-tabs{display:flex;gap:4px;margin-bottom:14px}
.report-tab{flex:1;height:34px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--fast)}
.report-tab.on{background:var(--pg);border-color:rgba(29,107,232,.3);color:var(--p)}
.report-text{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);padding:14px;font-size:12px;font-family:var(--fm);color:var(--t1);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow:auto;margin-bottom:12px}
.copy-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:38px;border:none;border-radius:var(--r1);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--fast)}
.copy-btn.whatsapp{background:#25D366;color:#fff}
.copy-btn.whatsapp:hover{opacity:.88}
.copy-btn.email{background:var(--p);color:#fff}
.copy-btn.email:hover{opacity:.88}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh1)}
.stat-num{font-size:1.6rem;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--t3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.06em}
.dash-table{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1)}
.dash-table-hdr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--s2)}
.dash-col-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--fm)}
.dash-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);align-items:center;cursor:pointer;transition:background var(--fast)}
.dash-row:hover{background:var(--s2)}
.dash-row:last-child{border-bottom:none}
.dash-name{font-size:13px;font-weight:600;color:var(--t1)}
.dash-sub{font-size:11px;color:var(--t3);font-family:var(--fm);margin-top:2px}
.dash-cell{font-size:12px;color:var(--t2)}
.no-dash{text-align:center;padding:40px;background:var(--s1);border:1px dashed var(--bd);border-radius:var(--r3)}

/* CASE HISTORY */
.history{display:flex;flex-direction:column;gap:12px}
.case-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);transition:border-color var(--fast)}
.case-card:hover{border-color:var(--bdem)}
.case-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;min-height:60px}
.case-av{width:38px;height:38px;border-radius:var(--r2);background:var(--s3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.case-info{flex:1;min-width:0}
.case-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case-meta{font-size:11px;font-family:var(--fm);color:var(--t3)}
.case-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chev{color:var(--t3);transition:transform var(--base) var(--eout)}.chev.open{transform:rotate(180deg)}
.case-body{border-top:1px solid var(--bd);padding:16px}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mini-f{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);padding:8px 10px}
.mini-l{font-family:var(--fm);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:3px}
.mini-v{font-size:12px;font-weight:600;color:var(--t1)}.mini-v.e{color:var(--t3);font-style:italic;font-weight:400}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:8px}
.case-notes-txt{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r1);padding:10px;font-size:12px;font-family:var(--fm);color:var(--t2);line-height:1.6;white-space:pre-wrap;margin-bottom:12px}
.case-no-notes{font-size:12px;font-family:var(--fm);color:var(--t3);font-style:italic;margin-bottom:12px}
.case-acts{display:flex;gap:8px;flex-wrap:wrap}
.no-cases{padding:48px;text-align:center;background:var(--s1);border:1px dashed var(--bd);border-radius:var(--r3)}

/* REJECTIONS & DEFERMENTS */
.rej-list{display:flex;flex-direction:column;gap:10px}
.rej-item{border-radius:var(--r2);border:1px solid;padding:12px 14px}
.rej-item.high{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.2)}
.rej-item.medium{background:rgba(180,83,9,.05);border-color:rgba(180,83,9,.2)}
.rej-item.low{background:rgba(2,132,199,.05);border-color:rgba(2,132,199,.2)}
.rej-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rej-date{font-family:var(--fm);font-size:11px;color:var(--t3);margin-left:auto}
.rej-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rej-f{display:flex;flex-direction:column;gap:2px}
.rej-full{grid-column:1/-1}
.rej-l{font-family:var(--fm);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.rej-v{font-size:12px;font-weight:600;color:var(--t1)}

.toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.divider{height:1px;background:var(--bd);margin:12px 0}

@media print{
  body{background:#fff!important;color:#111!important}
  .hdr,.tabs,.grid>:first-child,.toolbar,.notes-acts,.case-acts{display:none!important}
  .main{padding:0!important;max-width:100%!important}
  .rc,.case-card{border:1px solid #ddd!important;background:#fff!important;break-inside:avoid}
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdem);border-radius:3px}
:focus-visible{outline:2px solid var(--pr);outline-offset:2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── ZIP / DOWNLOAD FOLDER ──────────────────────────────────────────────── */
.btn-download-folder{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 12px;border-radius:var(--r2);background:transparent;border:1.5px dashed var(--bd);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--fast) var(--eout);font-family:var(--fu);margin-top:6px}
.btn-download-folder:hover{border-color:var(--p);color:var(--p);background:var(--pg)}
.zip-modal-wide{max-width:900px!important;height:84vh;display:flex;flex-direction:column}
.zip-body{display:flex;flex:1;overflow:hidden;gap:0}
.zip-left{width:360px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;padding:18px;overflow-y:auto;border-right:1px solid var(--bd)}
.zip-section{display:flex;flex-direction:column;gap:6px}
.zip-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--fm)}
.zip-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);color:var(--t1);font-family:var(--fu);font-size:13px;font-weight:500;padding:8px 11px;outline:none;transition:border-color var(--fast)}
.zip-input:focus{border-color:var(--p)}
.zip-input::placeholder{color:var(--t3);font-weight:400}
.zip-folder-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--p);background:var(--pg);border:1px solid rgba(29,107,232,.2);border-radius:6px;padding:3px 8px;font-family:var(--fm);word-break:break-all}
.zip-doc-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1}
.zip-doc-row{border:1px solid var(--bd);border-radius:var(--r2);padding:9px 10px;cursor:pointer;transition:all var(--fast);background:var(--s2)}
.zip-doc-row:hover{border-color:var(--p)}
.zip-doc-row.active{border-color:var(--p);background:var(--pg)}
.zip-doc-meta{margin-bottom:7px}
.zip-doc-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zip-doc-renamed{font-size:10px;color:var(--p);font-family:var(--fm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.8;margin-top:2px}
.zip-doc-controls{display:flex;flex-direction:column;gap:5px}
.zip-person-row{display:flex;gap:4px;margin-bottom:2px}
.zip-person-btn{flex:1;font-size:10px;font-weight:600;padding:3px 0;border-radius:var(--r1);border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;transition:all var(--fast);font-family:var(--fm)}
.zip-person-btn:hover{border-color:var(--p);color:var(--p)}
.zip-person-btn.on{background:var(--p);border-color:var(--p);color:#fff}
.zip-subtype-sel{margin-top:3px;font-size:11px;color:var(--info);border-color:rgba(2,132,199,.3)!important}
.zip-custom-label{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r1);color:var(--t1);font-family:var(--fm);font-size:11px;padding:4px 8px;outline:none;transition:border-color var(--fast)}
.zip-custom-label:focus{border-color:var(--p)}
.zip-custom-label::placeholder{color:var(--t3)}
.zip-error{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--err);font-family:var(--fm);padding:8px 10px;background:var(--errg);border:1px solid rgba(220,38,38,.2);border-radius:var(--r1)}
.zip-success{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ok);font-family:var(--fm);padding:8px 10px;background:var(--okg);border:1px solid rgba(5,150,105,.2);border-radius:var(--r1)}
.zip-preview-pane{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--s2)}
.zip-preview-hdr{display:flex;align-items:center;gap:7px;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:var(--t2);font-family:var(--fm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;background:var(--s3)}
.zip-preview-content{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:12px}
.zip-preview-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--r1);box-shadow:var(--sh2)}
.zip-preview-iframe{width:100%;height:100%;border:none;border-radius:var(--r1)}
.zip-preview-text{font-family:var(--fm);font-size:11px;color:var(--t2);line-height:1.7;white-space:pre-wrap;width:100%}
.zip-preview-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;opacity:.5}

/* ─── DOC LIST ENHANCEMENTS (sub-types, dependants, re-assess) ───────────── */
.doc-subsel{margin-top:3px;border-color:rgba(2,132,199,.3)!important;color:var(--info)!important}
.doc-subin{width:100%;margin-top:3px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r1);color:var(--t1);font-family:var(--fm);font-size:10px;padding:3px 7px;outline:none;transition:border-color var(--fast)}
.doc-subin:focus{border-color:var(--p)}.doc-subin::placeholder{color:var(--t3)}
.doc-dep-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;font-weight:600;color:var(--t3);background:transparent;border:1px dashed var(--bd);border-radius:var(--r1);padding:2px 8px;cursor:pointer;transition:all var(--fast)}
.doc-dep-toggle:hover{color:var(--p);border-color:var(--p)}
.doc-dep-row{display:flex;gap:4px;margin-top:4px}
.doc-dep-btn{flex:1;font-size:10px;font-weight:600;color:var(--p);background:var(--pg);border:1px solid rgba(29,107,232,.2);border-radius:var(--r1);padding:3px 0;cursor:pointer;transition:all var(--fast)}

/* ─── PREVIEW MODAL ──────────────────────────────────────────────────────── */
function PreviewModal({ doc, onClose }) {
  const [blobUrl, setBlobUrl] = useState(null);
  const [text, setText] = useState(null);
  useEffect(() => {
    const isImg = doc.file.type.startsWith("image/");
    const isPDF = doc.file.type === "application/pdf";
    if (isImg || isPDF) { const url = URL.createObjectURL(doc.file); setBlobUrl(url); return () => URL.revokeObjectURL(url); }
    else { doc.file.text().then(t => setText(t.slice(0,3000))); }
  }, [doc]);
  useEffect(() => {
    const h = e => e.key === "Escape" && onClose();
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, [onClose]);
  const isImg = doc.file.type.startsWith("image/"), isPDF = doc.file.type === "application/pdf";
  const name = doc.renamed || doc.file.name;
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" role="dialog">
        <div className="modal-hdr"><div className="rc-ico"><File size={14}/></div><span className="modal-title">{name}</span><button className="btn-ico" onClick={onClose}><X size={14}/></button></div>
        <div className="modal-body">
          {isImg && blobUrl && <img src={blobUrl} alt={name} className="modal-img"/>}
          {isPDF && blobUrl && <iframe src={blobUrl} title={name} className="modal-pdf"/>}
          {!isImg && !isPDF && text !== null && <div className="modal-txt">{text || "(empty)"}</div>}
          {!isImg && !isPDF && text === null && <div className="skel" style={{width:"100%",height:200}}/>}
        </div>
      </div>
    </div>
  );
}

/* ─── THUMB IMG ──────────────────────────────────────────────────────────── */
function ThumbImg({ file }) {
  const [src, setSrc] = useState(null);
  useEffect(() => { const url = URL.createObjectURL(file); setSrc(url); return () => URL.revokeObjectURL(url); }, [file]);
  return src ? <img src={src} alt=""/> : <div className="skel" style={{width:"100%",height:"100%"}}/>;
}

/* ─── EXPIRY ALERTS ──────────────────────────────────────────────────────── */
function ExpiryAlerts({ profile }) {
  const alerts = [];
  const days = daysUntilExpiry(profile.passportExpiry);
  if (days !== null) {
    if (days < 0)   alerts.push({type:"danger",label:"Passport Expired",detail:`Passport expired ${Math.abs(days)} days ago. A new passport is required immediately.`});
    else if (days < 90)  alerts.push({type:"danger",label:"Passport Expiring Soon",detail:`Passport expires in ${days} days. Most visas require 6 months validity beyond course end.`});
    else if (days < 180) alerts.push({type:"warn",label:"Passport Validity Warning",detail:`Passport expires in ${days} days. Check if this covers your full study period + 6 months.`});
  }
  if (!alerts.length) return null;
  return (
    <div style={{marginBottom:10}}>
      {alerts.map((a,i) => (
        <div key={i} className={`expiry-alert ${a.type}`}>
          <div className={`expiry-alert-icon ${a.type}`}><Bell size={14}/></div>
          <div><div className="expiry-title">{a.label}</div><div className="expiry-detail">{a.detail}</div></div>
        </div>
      ))}
    </div>
  );
}

/* ─── QUALITY CARD ───────────────────────────────────────────────────────── */
function QualityCard({ docs, qualities }) {
  const issues = docs.filter(d => { const q = qualities[d.id]; return q && (q.status==="warn"||q.status==="error"); });
  if (!issues.length) return null;
  return (
    <div className="qa-card">
      <div className="qa-hdr"><TriangleAlert size={15} color="#B45309"/><span className="qa-ttl">Document Quality Issues</span><span className="badge b-warn">{issues.length} file{issues.length!==1?"s":""}</span></div>
      <div className="qa-body">
        {issues.map(d => {
          const q = qualities[d.id], isErr = q.status==="error";
          return (
            <div key={d.id} className={`qa-item ${isErr?"err":"warn"}`}>
              <div className={`qa-ico ${isErr?"err":"warn"}`}>{isErr?<EyeOff size={15}/>:<Eye size={15}/>}</div>
              <div><div className="qa-n">{d.renamed||d.file.name}</div><div className="qa-d">{isErr?`Unreadable — ${q.detail||"File could not be processed."}`:`Low quality — ${q.detail||"Some data may be inaccurate."}`}</div></div>
            </div>
          );
        })}
        <div className="qa-tip"><Info size={13} style={{flexShrink:0,marginTop:1}}/><span>Re-upload clearer scans at 300 DPI+. Fields marked "Not found" may be caused by poor image quality.</span></div>
      </div>
    </div>
  );
}

/* ─── FUNDS SUFFICIENCY BANNER ───────────────────────────────────────────── */
function FundsSufficiencyBanner({ balance, required }) {
  const [convertedInput, setConvertedInput] = useState("");

  if (!balance || !required || balance.trim() === "" || required.trim() === "") return null;

  const parsed    = parseCurrencyAmount(balance);
  const reqParsed = parseCurrencyAmount(required);

  if (parsed.amount === null && reqParsed.amount === null) {
    return (
      <div className="fsb fsb-unclear">
        <Info size={13} style={{flexShrink:0,marginTop:1}}/>
        <div className="fsb-body">
          <div className="fsb-title">Cannot determine sufficiency</div>
          <div className="fsb-detail">Could not parse either amount — verify manually before submission.</div>
        </div>
      </div>
    );
  }

  const currenciesMatch =
    parsed.currency && reqParsed.currency &&
    parsed.currency === reqParsed.currency;

  if (!currenciesMatch) {
    // Try to resolve via manually entered conversion
    const converted = parseFloat(convertedInput.replace(/[^0-9.]/g,""));
    const hasConverted = !isNaN(converted) && converted > 0;
    const req = reqParsed.amount;
    const sym = reqParsed.currency || parsed.currency || "";

    if (hasConverted && req !== null) {
      const diff = converted - req;
      const sufficient = diff >= 0;
      const fmt = n => n.toLocaleString(undefined, { maximumFractionDigits: 0 });
      return (
        <div className={`fsb ${sufficient ? "fsb-ok" : "fsb-fail"}`}>
          {sufficient ? <CheckCircle size={13} style={{flexShrink:0,marginTop:1}}/> : <AlertCircle size={13} style={{flexShrink:0,marginTop:1}}/>}
          <div className="fsb-body">
            <div className="fsb-title">
              {sufficient
                ? `Appears sufficient — ${sym} ${fmt(converted)} equivalent vs ${sym} ${fmt(req)} required (+${sym} ${fmt(diff)})`
                : `Apparent shortfall — ${sym} ${fmt(Math.abs(diff))} below requirement`
              }
            </div>
            <div className="fsb-detail" style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
              <span>Based on your conversion. Verify live exchange rate before submission.</span>
              <button className="fsb-clear-btn" onClick={()=>setConvertedInput("")}>Change amount</button>
            </div>
          </div>
        </div>
      );
    }

    return (
      <div className="fsb fsb-convert">
        <DollarSign size={13} style={{flexShrink:0,marginTop:1,color:"var(--info)"}}/>
        <div className="fsb-body">
          <div className="fsb-title" style={{color:"var(--info)"}}>
            Currencies differ ({parsed.currency||"?"} available · {reqParsed.currency||"?"} required)
          </div>
          <div className="fsb-convert-row">
            <label className="fsb-convert-lbl">
              Enter {parsed.currency||"available"} equivalent in {reqParsed.currency||"required currency"}:
            </label>
            <div className="fsb-convert-input-wrap">
              <span className="fsb-convert-sym">{reqParsed.currency||""}</span>
              <input
                className="fsb-convert-input"
                type="number"
                min="0"
                placeholder="e.g. 18000"
                value={convertedInput}
                onChange={e => setConvertedInput(e.target.value)}
              />
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Same currency
  const avail = parsed.amount;
  const req   = reqParsed.amount;
  const diff  = avail - req;
  const pct   = req > 0 ? ((avail / req) * 100).toFixed(0) : null;
  const sufficient = diff >= 0;
  const fmt   = n => n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  const sym   = parsed.currency;

  return (
    <div className={`fsb ${sufficient ? "fsb-ok" : "fsb-fail"}`}>
      {sufficient
        ? <CheckCircle size={13} style={{flexShrink:0,marginTop:1}}/>
        : <AlertCircle size={13} style={{flexShrink:0,marginTop:1}}/>
      }
      <div className="fsb-body">
        <div className="fsb-title">
          {sufficient
            ? `Appears sufficient — ${sym} ${fmt(avail)} available vs ${sym} ${fmt(req)} required (+${sym} ${fmt(diff)})`
            : `Apparent shortfall — ${sym} ${fmt(Math.abs(diff))} below requirement`
          }
        </div>
        <div className="fsb-detail">
          {sufficient
            ? `${pct}% of requirement met. Verify figure reflects current visa rules before submission.`
            : `Available ${sym} ${fmt(avail)} · Required ${sym} ${fmt(req)}. Additional funds or sponsor docs may be needed.`
          }
        </div>
      </div>
    </div>
  );
}

/* ─── OFFER LETTERS SECTION (inline in ProfileCard) ─────────────────────── */
function OfferLettersSection({ data, setData, preferredIdx, setPreferredIdx }) {
  const offers = Array.isArray(data.offerLetters) ? data.offerLetters : [];

  function updateOffer(i, field, val) {
    setData(p => {
      const next = [...(p.offerLetters||[])];
      next[i] = { ...next[i], [field]: val };
      return { ...p, offerLetters: next };
    });
  }
  function addOffer() {
    setData(p => ({ ...p, offerLetters: [...(p.offerLetters||[]), { status:"Full", university:"", country:"", program:"", intakeSeason:"", conditions:"" }] }));
  }
  function removeOffer(i) {
    setData(p => {
      const next = (p.offerLetters||[]).filter((_,j) => j !== i);
      return { ...p, offerLetters: next };
    });
    if (preferredIdx >= i && preferredIdx > 0) setPreferredIdx(preferredIdx - 1);
  }

  const statusBadge = s => {
    if (!s || s === "Not Found") return "b-neu";
    if (s === "Full") return "b-ok";
    if (s === "Conditional") return "b-warn";
    return "b-neu";
  };

  return (
    <div className="pgroup">
      <div className="pgroup-label" style={{display:"flex",alignItems:"center",gap:8}}>
        Offer Letters
        <span className="badge b-neu" style={{fontSize:9,marginLeft:2}}>{offers.length} offer{offers.length!==1?"s":""}</span>
        <button className="offer-add-btn" onClick={addOffer} title="Add offer letter manually">+ Add</button>
      </div>
      {offers.length === 0 ? (
        <div className="offer-empty">No offer letters extracted — add one manually or re-analyse.</div>
      ) : (
        <div className="offer-list">

                  <input className="pval-input" value={offer.intakeSeason||""} onChange={e=>updateOffer(i,"intakeSeason",e.target.value)} placeholder="e.g. Sep 2026"/>

                  <div className="plbl">Programme</div>

                    <div className="plbl">Conditions</div>

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── PROFILE CARD ───────────────────────────────────────────────────────── */
function ProfileCard({ data, setData, preferredOfferIndex, setPreferredOfferIndex, requirementsData }) {
  // Auto-populate fundsRequired from university data when preferred offer changes
  useEffect(() => {
    if (!requirementsData) return;
    // Only auto-populate if counsellor hasn't manually set it
    if (data.fundsRequiredSource === "manual" && data.fundsRequired) return;
    const lookup = lookupFundsRequired(data, preferredOfferIndex, requirementsData);
    if (lookup) {
      setData(p => ({ ...p, fundsRequired: lookup.value, fundsRequiredSource: "auto", fundsRequiredLabel: lookup.label, fundsRequiredDataSource: lookup.source }));
    } else {
      // Clear auto value if offer changes to one with no data
      if (data.fundsRequiredSource === "auto") {
        setData(p => ({ ...p, fundsRequired: "", fundsRequiredSource: null, fundsRequiredLabel: "", fundsRequiredDataSource: null }));
      }

  const autoLookup   = requirementsData ? lookupFundsRequired(data, preferredOfferIndex, requirementsData) : null;

      {k:"university",     l:"University"},
      {k:"academicResult", l:"Academic Result / GPA",  w:true, multiline:true},
    ]},

      {k:"ieltsScore",        l:"IELTS Score"},
      {k:"toeflScore",        l:"TOEFL Score"},

      {k:"otherEnglishTest",  l:"Other English Test / Cert", w:true, placeholder:"No test/certification found"},

        {rows.map(row => (

              {row.fields.map(f => (
